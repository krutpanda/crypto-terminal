<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PANDA Charting</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header id="toolbar">
    <span class="brand">PANDA Charting</span>
    <span class="futBadge">Futures</span>

    <div class="symBox">
      <input id="symbolInput" value="BTCUSDT" spellcheck="false" autocomplete="off" title="Symbol (press Enter or pick from list)" />
      <div id="symbolList" class="symList"></div>
    </div>

    <select id="tfSelect" title="Timeframe">
      <option value="1m">1m</option>
      <option value="5m" selected>5m</option>
      <option value="15m">15m</option>
      <option value="1h">1h</option>
      <option value="4h">4h</option>
      <option value="1d">1d</option>
    </select>

    <label class="thr">Bubble &ge; $
      <input id="thresholdInput" type="number" value="100000" step="1000" min="0" />
    </label>

    <button id="autoBtn" class="active" title="Auto-center live price (like TradingView)">A</button>
    <button id="depthToggle" class="active" title="Hide or show market depth">Depth</button>

    <span id="deltaInfo" class="delta"></span>
    <span id="bubbleInfo" class="delta"></span>
    <span id="depthInfo" class="delta"></span>
    <span id="status" class="status">connecting&hellip;</span>
  </header>

  <main>
    <div id="chartWrap">
      <div id="chart"></div>
      <div id="ohlcInfo" class="ohlcInfo">Move crosshair over a candle</div>
      <canvas id="bubbleCanvas"></canvas>
    </div>
    <aside id="depthPanel">
      <div class="depthHead">
        <span>Market Depth</span>
        <button id="depthHide" title="Hide depth chart">Hide</button>
      </div>
      <canvas id="depthCanvas"></canvas>
      <div id="domPanel" class="domPanel">
        <div class="domHead">DOM Trades ≥ $50K</div>
        <div id="domRows" class="domRows"></div>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
